on:
  workflow_dispatch:
  pull_request:
    branches: main
  push:
    branches: main
  schedule:
    # Run every Monday at 10am UTC
    - cron: '0 10 * * 1'

name: Link Check

permissions:
  contents: read

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check links with Lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # Longer timeout (default 20s is too tight for some EMODnet
          # endpoints) and a few retries so transient slow responses
          # don't fail the workflow.
          args: >-
            --verbose
            --no-progress
            --timeout 60
            --max-retries 3
            --retry-wait-time 5
            '**/*.qmd'
            '**/*.md'
          # Advisory on PRs: GHA runners hit transient CDN/network failures
          # on perfectly healthy URLs (quarto.org, stacspec.org, etc.). The
          # weekly scheduled run on main is the authoritative link-rot
          # signal; PR runs post a job summary but do not block merge.
          fail: ${{ github.event_name == 'schedule' || github.event_name == 'push' }}
          jobSummary: true
